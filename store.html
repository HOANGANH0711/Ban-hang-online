<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>
<style>
body {
    font-family: Arial;
    background: 
#f5f5f5;
    margin: 0;
}
.header {
    background: 
#ee4d2d;
    color: white;
    padding: 15px;
    font-size: 22px;
}
.container {
    width: 80%;
    margin: 20px auto;
}
.cart-item {
    display: flex;
    align-items: center;
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
}
.cart-item img {
    width: 80px;
    margin-right: 15px;
}
.info {
    flex: 2;
}
.price {
    color: 
#ee4d2d;
    font-weight: bold;
}
.quantity {
    display: flex;
    align-items: center;
}
.quantity button {
    width: 30px;
    height: 30px;
    cursor: pointer;
}
.quantity input {
    width: 40px;
    text-align: center;
}
.delete {
    color: red;
    cursor: pointer;
    margin-left: 20px;
}
.footer {
    background: white;
    padding: 20px;
    position: sticky;
    bottom: 0;
    display: flex;
    justify-content: space-between;
}
.checkout-btn {
    background: 
#ee4d2d;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="header"> Giỏ hàng</div>
<div class="container">
    <div class="cart-item" data-price="150000">
        <img src="images/ao.jpg">
        <div class="info">
            <div>Áo thun</div>
            <div class="price">150.000đ</div>
        </div>
        <div class="quantity">
            <button onclick="decrease(this)">-</button>
            <input type="text" value="1" onchange="updateTotal()">
            <button onclick="increase(this)">+</button>
        </div>
        <div class="delete" onclick="removeItem(this)">Xóa</div>
    </div>
    <div class="cart-item" data-price="500000">
        <img src="images/giay.jpg">
        <div class="info">
            <div>Giày sneaker</div>
            <div class="price">500.000đ</div>
        </div>
        <div class="quantity">
            <button onclick="decrease(this)">-</button>
            <input type="text" value="1" onchange="updateTotal()">
            <button onclick="increase(this)">+</button>
        </div>
        <div class="delete" onclick="removeItem(this)">Xóa</div>
    </div>
</div>
<div class="footer">
    <div>Tổng tiền: <strong id="total">0đ</strong></div>
    <button class="checkout-btn">Mua hàng</button>
</div>
<script>
function increase(btn) {
    let input = btn.parentElement.querySelector("input");
    input.value = parseInt(input.value) + 1;
    updateTotal();
}
function decrease(btn) {
    let input = btn.parentElement.querySelector("input");
    if (input.value > 1) {
        input.value = parseInt(input.value) - 1;
        updateTotal();
    }
}
function removeItem(btn) {
    btn.parentElement.remove();
    updateTotal();
}
function updateTotal() {
    let items = document.querySelectorAll(".cart-item");
    let total = 0;
    items.forEach(item => {
        let price = parseInt(item.getAttribute("data-price"));
        let quantity = parseInt(item.querySelector("input").value);
        total += price * quantity;
    });
    document.getElementById("total").innerText =
        total.toLocaleString('vi-VN') + "đ";
}
// chạy khi load trang
updateTotal();
</script>
</body>
</html>
